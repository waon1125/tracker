  let oauthTokenExpireAt = parseInt(sessionStorage.getItem('analyzer_oauth_expire') || '0');
  let oauthMyChannelId = sessionStorage.getItem('analyzer_oauth_channel') || null;
  
  function saveOAuthState() {
    if (oauthAccessToken) {
      sessionStorage.setItem('analyzer_oauth_token', oauthAccessToken);
      sessionStorage.setItem('analyzer_oauth_expire', String(oauthTokenExpireAt));
      if (oauthMyChannelId) sessionStorage.setItem('analyzer_oauth_channel', oauthMyChannelId);
    } else {
      sessionStorage.removeItem('analyzer_oauth_token');
      sessionStorage.removeItem('analyzer_oauth_expire');
      sessionStorage.removeItem('analyzer_oauth_channel');
    }
  }
  
  function applyTheme() {
    document.documentElement.setAttribute('data-theme', currentTheme);
    document.documentElement.setAttribute('data-color', currentColor);

  function showLogin() { document.getElementById('loginScreen').classList.remove('hidden'); }
  function hideLogin() { document.getElementById('loginScreen').classList.add('hidden'); }

  document.getElementById('googleLoginBtn').addEventListener('click', async () => {
    const provider = new firebase.auth.GoogleAuthProvider();
    try {
      document.getElementById('loginError').classList.add('hidden');
      await firebaseAuth.signInWithPopup(provider);

    if (!confirm('ログアウトしますか？')) return;
    await firebaseAuth.signOut();
  });

    if (user) {
      if (!ALLOWED_EMAILS.includes(user.email)) {

        errEl.textContent = `このアカウント（${user.email}）はアクセス許可されていません`;
        errEl.classList.remove('hidden');

  // ==== Firestore ====
  const DOC_ID = 'analyzer-data';
  const COLLECTION = 'analyzer';
  let firestoreUnsubscribe = null;
  let firestoreLastSaved = null;

  async function loadFirestoreData() {
    try {
      const snap = await firestoreDb.collection(COLLECTION).doc(DOC_ID).get();
      if (snap.exists) {
        const data = snap.data();
        // 旧バージョンからの移行対応（channelsが配列だった時代のデータ）
        if (Array.isArray(data.channels)) {
          channels = { copi: null, waon: null, rivals: [] };
          for (const ch of data.channels) {
            const name = (ch.title || '').toLowerCase();
            if (name.includes('和音') || name.includes('waon') || name.includes('わおん')) {
              channels.waon = { info: ch };
            } else if (name.includes('コピ') || name.includes('copi')) {
              channels.copi = { info: ch };
            } else {
              channels.rivals.push({ info: ch });
            }
          }
          videos = (data.videos || []).map(v => ({ ...v, tabKey: detectTabKey(v) }));
          await saveFirestoreData();
        } else {
          channels = data.channels || { copi: null, waon: null, rivals: [] };
          if (!channels.rivals) channels.rivals = [];
          videos = data.videos || [];
        }
        firestoreLastSaved = JSON.stringify({ channels, videos });
      } else {
        await saveFirestoreData();
      }
    } catch (err) {
      console.error('[Firestore] 読み込みエラー:', err);
      alert('データ読み込みエラー: ' + err.message);
    }
  }
  
  function detectTabKey(video) {
    if (video.tabKey) return video.tabKey;
    const channelId = video.channelId;
    if (channels.copi?.info?.id === channelId) return 'copi';
    if (channels.waon?.info?.id === channelId) return 'waon';
    if (channels.rivals.some(r => r.info.id === channelId)) return 'rival';
    const title = (video.channelTitle || '').toLowerCase();
    if (title.includes('和音') || title.includes('waon') || title.includes('わおん')) return 'waon';
    if (title.includes('コピ') || title.includes('copi')) return 'copi';
    return 'rival';
  }

  let saveInProgress = false;
  let savePending = false;
  async function saveFirestoreData() {
    if (saveInProgress) { savePending = true; return; }
    saveInProgress = true;
    try {
      await firestoreDb.collection(COLLECTION).doc(DOC_ID).set({
        channels, videos,
        _updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      firestoreLastSaved = JSON.stringify({ channels, videos });
    } catch (err) {
      console.error('[Firestore] 保存エラー:', err);
      alert('保存エラー: ' + err.message);
    } finally {
      saveInProgress = false;
      if (savePending) { savePending = false; setTimeout(() => saveFirestoreData(), 100); }
    }
  }

  function startRealtimeListener() {
    if (firestoreUnsubscribe) firestoreUnsubscribe();
    firestoreUnsubscribe = firestoreDb.collection(COLLECTION).doc(DOC_ID)
      .onSnapshot((snap) => {
        if (snap.metadata.hasPendingWrites) return;
        if (!snap.exists) return;
        const data = snap.data();
        const newChannels = data.channels || { copi: null, waon: null, rivals: [] };
        if (!newChannels.rivals) newChannels.rivals = [];
        const newVideos = data.videos || [];
        const json = JSON.stringify({ channels: newChannels, videos: newVideos });
        if (json === firestoreLastSaved) return;
        channels = newChannels;
        videos = newVideos;
        firestoreLastSaved = json;
        renderAll();
      }, (err) => console.error('[Firestore] リスナーエラー:', err));
  }

  // ==== YouTube API ====
  const YT_BASE = 'https://www.googleapis.com/youtube/v3';

  function parseChannelInput(input) {
    input = input.trim();
    let m = input.match(/youtube\.com\/channel\/(UC[\w-]+)/);
    if (m) return { type: 'id', value: m[1] };
    m = input.match(/youtube\.com\/@([\w.-]+)/);
    if (m) return { type: 'handle', value: m[1] };
    if (input.startsWith('@')) return { type: 'handle', value: input.slice(1) };
    if (input.match(/^UC[\w-]+$/)) return { type: 'id', value: input };
    return { type: 'handle', value: input };
  }

  async function youtubeFetch(endpoint, params) {
    const url = new URL(`${YT_BASE}/${endpoint}`);
    for (const [k, v] of Object.entries(params)) url.searchParams.append(k, v);
    url.searchParams.append('key', YOUTUBE_API_KEY);
    const res = await fetch(url);
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(`YouTube API: ${err.error?.message || res.statusText}`);
    }
    return await res.json();
  }

  async function fetchChannelInfo(input) {
    const parsed = parseChannelInput(input);
    const params = { part: 'snippet,statistics,contentDetails' };
    if (parsed.type === 'id') params.id = parsed.value;
    else params.forHandle = '@' + parsed.value;
    const data = await youtubeFetch('channels', params);
    if (!data.items || data.items.length === 0) throw new Error('チャンネルが見つかりません');
    const info = data.items[0];
    return {
      id: info.id,
      handle: info.snippet.customUrl || '',
      title: info.snippet.title,
      thumbnailUrl: info.snippet.thumbnails?.default?.url || '',
      subscriberCount: parseInt(info.statistics.subscriberCount || 0),
      videoCount: parseInt(info.statistics.videoCount || 0),
      uploadsPlaylistId: info.contentDetails.relatedPlaylists.uploads,
      addedAt: new Date().toISOString()
    };
  }

  async function fetchVideoInfo(videoIds) {
    if (videoIds.length === 0) return [];
    const chunks = [];
    for (let i = 0; i < videoIds.length; i += 50) chunks.push(videoIds.slice(i, i + 50));
    const results = [];
    for (const chunk of chunks) {
      const data = await youtubeFetch('videos', {
        part: 'snippet,statistics,contentDetails',
        id: chunk.join(',')
      });
      results.push(...(data.items || []));
    }
    return results;
  }

  async function fetchChannelUploads(uploadsPlaylistId, max = 10) {
    const data = await youtubeFetch('playlistItems', {
      part: 'contentDetails',
      playlistId: uploadsPlaylistId,
      maxResults: max
    });
    return (data.items || []).map(item => item.contentDetails.videoId);
  }

  // ==== タブ ====
  function renderTabs() {
    const container = document.getElementById('tabs');
    container.innerHTML = FIXED_TABS.map(t => `
      <button class="tab ${currentTab === t.key ? 'active' : ''}" data-tab-key="${t.key}">
        <span>${t.emoji}</span><span>${t.label}</span>
      </button>
    `).join('');
    container.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => switchTab(btn.dataset.tabKey));
    });
  }
  
  function switchTab(key) {
    currentTab = key;
    renderAll();
  }

  // ==== チャンネル登録 ====
  async function registerFixedChannel(tabKey, input) {
    if (!input) return;
    try {
      const info = await fetchChannelInfo(input);
      channels[tabKey] = { info };
      await saveFirestoreData();
      await fetchVideosForChannel(info, tabKey, 10);
    } catch (err) {
      alert('登録失敗: ' + err.message);
    }
  }

  async function removeFixedChannel(tabKey) {
    const ch = channels[tabKey];
    if (!ch) return;
    if (!confirm(`「${ch.info.title}」の登録を解除しますか？\n（関連動画もすべて削除されます）`)) return;
    channels[tabKey] = null;
    videos = videos.filter(v => v.tabKey !== tabKey);
    await saveFirestoreData();
    renderAll();
  }

  async function registerRivalChannel(input) {
    if (!input) return;
    try {
      const info = await fetchChannelInfo(input);
      if (channels.rivals.find(r => r.info.id === info.id)) {
        alert('既に登録されています'); return;
      }
      if (channels.copi?.info?.id === info.id || channels.waon?.info?.id === info.id) {
        alert('このチャンネルは既に固定タブに登録されています'); return;
      }
      channels.rivals.push({ info });
      // 既存の競合チャンネル2件以上ある場合は新規チャンネル以外を自動折りたたみ
      if (channels.rivals.length > 1) {
        channels.rivals.forEach(r => {
          if (r.info.id !== info.id) collapsedRivals.add(r.info.id);
        });
      }
      await saveFirestoreData();
      await fetchVideosForChannel(info, 'rival', 10);
    } catch (err) {
      alert('追加失敗: ' + err.message);
    }
  }

  async function removeRivalChannel(channelId) {
    const ch = channels.rivals.find(r => r.info.id === channelId);
    if (!ch) return;
    if (!confirm(`「${ch.info.title}」を削除しますか？\n（関連動画もすべて削除されます）`)) return;
    channels.rivals = channels.rivals.filter(r => r.info.id !== channelId);
    videos = videos.filter(v => v.channelId !== channelId);
    await saveFirestoreData();
    renderAll();
  }

  // 動画取得
  async function fetchVideosForChannel(channelInfo, tabKey, maxVideos = 10) {
    try {
      const videoIds = await fetchChannelUploads(channelInfo.uploadsPlaylistId, maxVideos);
      const existingIds = new Set(videos.filter(v => v.channelId === channelInfo.id).map(v => v.videoId));
      const newIds = videoIds.filter(id => !existingIds.has(id));
      if (newIds.length === 0) { renderAll(); return 0; }
      const infos = await fetchVideoInfo(newIds);
      const now = new Date().toISOString();
      for (const info of infos) {
        videos.push({
          id: 'v_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8),
          videoId: info.id,
          title: info.snippet.title,
          description: (info.snippet.description || '').slice(0, 500),
          channelId: info.snippet.channelId,
          channelTitle: info.snippet.channelTitle,
          tabKey: tabKey,
          thumbnailUrl: info.snippet.thumbnails?.medium?.url || info.snippet.thumbnails?.default?.url || '',
          publishedAt: info.snippet.publishedAt,
          duration: info.contentDetails.duration,
          tags: info.snippet.tags || [],
          snapshots: [{
            at: now,
            views: parseInt(info.statistics.viewCount || 0),
            likes: parseInt(info.statistics.likeCount || 0),
            comments: parseInt(info.statistics.commentCount || 0)
          }],
          addedAt: now
        });
      }
      await saveFirestoreData();
      renderAll();
      return newIds.length;
    } catch (err) {
      console.error(err);
      alert('動画取得失敗: ' + err.message);
      return 0;
    }
  }

  // スナップショット取得
  async function snapshotVideos(videoIds) {
    if (videoIds.length === 0) return;
    try {
      const infos = await fetchVideoInfo(videoIds);
      const now = new Date().toISOString();
      for (const info of infos) {
        const v = videos.find(x => x.videoId === info.id);
        if (!v) continue;
        v.snapshots = v.snapshots || [];
        v.snapshots.push({
          at: now,
          views: parseInt(info.statistics.viewCount || 0),
          likes: parseInt(info.statistics.likeCount || 0),
          comments: parseInt(info.statistics.commentCount || 0)
        });
        v.title = info.snippet.title;
      }
      await saveFirestoreData();
      renderAll();
    } catch (err) {
      alert('スナップショット取得失敗: ' + err.message);
    }
  }

  async function removeVideo(vid) {
    if (!confirm('この動画の追跡を停止して削除しますか？')) return;
    videos = videos.filter(v => v.id !== vid);
    await saveFirestoreData();
    renderAll();
  }

  // ==== 描画 ====
  function renderAll() {
    renderTabs();
    renderLastUpdate();
    renderFixedTabContent('copi');
    renderFixedTabContent('waon');
    renderRivalTabContent();
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    const el = document.getElementById('tab-' + currentTab);
    if (el) el.classList.add('active');
  }
  
  function renderLastUpdate() {
    let latest = null;
    videos.forEach(v => {
      (v.snapshots || []).forEach(s => {
        if (!latest || new Date(s.at) > new Date(latest)) latest = s.at;
      });
    });
    const el = document.getElementById('lastUpdate');
    if (latest) {
      const d = new Date(latest);
      el.textContent = `最終更新: ${d.toLocaleString('ja-JP', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' })}`;
    } else {
      el.textContent = '';
    }
  }

  function renderFixedTabContent(tabKey) {
    const container = document.getElementById('tab-' + tabKey);
    const ch = channels[tabKey];
    const tabInfo = FIXED_TABS.find(t => t.key === tabKey);
    
    if (ch && ch.info) {
      const vids = videos.filter(v => v.tabKey === tabKey);
      container.innerHTML = `
        <div class="section">
          <h2 class="section-title">${tabInfo.emoji} ${escapeHtml(ch.info.title)}</h2>
          <div class="channel-info-card">
            <img src="${escapeHtml(ch.info.thumbnailUrl)}" alt="">
            <div class="ci-main">
              <div class="ci-name">${escapeHtml(ch.info.title)}</div>
              <div class="ci-meta">📊 登録者: ${ch.info.subscriberCount.toLocaleString()}人 · 動画: ${ch.info.videoCount.toLocaleString()}本 · 追跡中: ${vids.length}本</div>
            </div>
            <div class="ci-actions">
              <button class="btn btn-sm btn-success" data-fixed-snapshot="${tabKey}">📸 スナップショット取得</button>
              <button class="btn btn-sm" data-fixed-refresh="${tabKey}">🔄 最新動画</button>
              <button class="btn btn-sm btn-primary" data-fixed-analytics="${tabKey}">📊 詳細データ一斉取得</button>
              <button class="btn btn-sm btn-danger" data-fixed-remove="${tabKey}">🗑️ 解除</button>
            </div>
          </div>
        </div>
        <div class="section">
          <h3 class="section-title">🎬 追跡中の動画</h3>
          ${vids.length === 0 
            ? `<div class="empty-state"><div class="empty-emoji">🎬</div><div class="empty-text">動画がまだ取得されていません</div></div>`
            : renderVideoListHtml(vids)}
        </div>
      `;
      
      container.querySelector('[data-fixed-snapshot]').addEventListener('click', async (e) => {
        const btn = e.currentTarget;
        if (vids.length === 0) { alert('動画が登録されていません'); return; }
        btn.disabled = true; btn.textContent = '📸 取得中...';
        try {
          await snapshotVideos(vids.map(v => v.videoId));
          alert(`${vids.length}本のスナップショットを取得しました`);
        } finally { btn.disabled = false; btn.textContent = '📸 スナップショット取得'; }
      });
      container.querySelector('[data-fixed-refresh]').addEventListener('click', async (e) => {
        const btn = e.currentTarget;
        btn.disabled = true; btn.textContent = '🔄 取得中...';
        try {
          const n = await fetchVideosForChannel(ch.info, tabKey, 10);
          alert(`${n}本の新規動画を追加しました`);
        } finally { btn.disabled = false; btn.textContent = '🔄 最新動画'; }
      });
      container.querySelector('[data-fixed-remove]').addEventListener('click', () => removeFixedChannel(tabKey));
      
      // 詳細データ一斉取得
      const analyticsBtn = container.querySelector('[data-fixed-analytics]');
      if (analyticsBtn) {
        analyticsBtn.addEventListener('click', async () => {
          if (!isOAuthAuthenticated()) {
            alert('⚠️ まず⚙️設定から「🔐 YouTube連携」してください');
            return;
          }
          if (vids.length === 0) { alert('動画が登録されていません'); return; }
          if (!confirm(`${vids.length}本の動画の詳細データ（維持率等）を取得します。\n⚠️ 自分のチャンネルかつOAuth認証済みの場合のみ動作します。`)) return;
          analyticsBtn.disabled = true; analyticsBtn.textContent = '⏳ 取得中... (0/' + vids.length + ')';
          let ok = 0, fail = 0;
          const errors = [];
          for (let i = 0; i < vids.length; i++) {
            const v = vids[i];
            try {
              const data = await fetchAnalytics(v.videoId, v.publishedAt);
              if (data) {
                if (!v.analyticsSnapshots) v.analyticsSnapshots = [];
                const snapshot = { ...data, at: new Date().toISOString() };
                v.analyticsSnapshots.push(snapshot);
                v.analytics = { ...snapshot, fetchedAt: snapshot.at };
                ok++;
              } else {
                fail++;
                errors.push(`・${v.title.slice(0, 30)}: データなし（投稿直後の可能性）`);
              }
            } catch (err) {
              console.error(`[Analytics] ${v.videoId}:`, err);
              fail++;
              errors.push(`・${v.title.slice(0, 30)}: ${err.message}`);
              // OAuth期限切れなら中断
              if (err.message.includes('401') || err.message.includes('Unauthorized') || err.message.includes('invalid_token')) {
                errors.push('⚠️ OAuth認証が切れました。⚙️設定から再連携してください。');
                break;
              }
            }
            analyticsBtn.textContent = '⏳ 取得中... (' + (i+1) + '/' + vids.length + ')';
            // API レート制限対策で少し待つ
            await new Promise(r => setTimeout(r, 300));
          }
          await saveFirestoreData();
          renderAll();
          analyticsBtn.disabled = false; analyticsBtn.textContent = '📊 詳細データ一斉取得';
          let msg = `✅ 取得完了\n成功: ${ok}本\n失敗: ${fail}本`;
          if (errors.length > 0) {
            msg += '\n\n【エラー詳細】\n' + errors.slice(0, 10).join('\n');
            if (errors.length > 10) msg += `\n...他${errors.length - 10}件`;
          }
          alert(msg);
        });
      }
      attachVideoListHandlers(container);
    } else {
      container.innerHTML = `
        <div class="section">
          <h2 class="section-title">${tabInfo.emoji} ${escapeHtml(tabInfo.label)}</h2>
          <div class="registration-row">
            <input type="text" class="input-field" id="input-${tabKey}" placeholder="チャンネルURL or @handle">
            <button class="btn btn-primary" id="register-${tabKey}">登録</button>
          </div>
          <p class="hint">例：<code>https://www.youtube.com/@channel</code></p>
        </div>
      `;
      container.querySelector(`#register-${tabKey}`).addEventListener('click', async () => {
        const btn = container.querySelector(`#register-${tabKey}`);
        const input = container.querySelector(`#input-${tabKey}`).value.trim();
        btn.disabled = true; btn.textContent = '取得中...';
        try {
          await registerFixedChannel(tabKey, input);
        } finally { btn.disabled = false; btn.textContent = '登録'; }
      });
    }
  }

  function renderVideoListHtml(list) {
    const sorted = [...list].sort((a, b) => new Date(b.publishedAt) - new Date(a.publishedAt));
    return '<div class="video-list">' + sorted.map(v => {
      const lastSnap = v.snapshots && v.snapshots.length > 0 
        ? v.snapshots[v.snapshots.length - 1] 
        : { views: 0, likes: 0, comments: 0 };
      const published = new Date(v.publishedAt);
      const hoursSince = (Date.now() - published.getTime()) / 3600000;
      let timeAgo;
      if (hoursSince < 1) timeAgo = Math.round(hoursSince * 60) + '分前';
      else if (hoursSince < 24) timeAgo = Math.round(hoursSince) + '時間前';
      else if (hoursSince < 24 * 7) timeAgo = Math.round(hoursSince / 24) + '日前';
      else timeAgo = Math.round(hoursSince / 24 / 7) + '週間前';
      return `
        <div class="video-card">
          <img src="${escapeHtml(v.thumbnailUrl)}" alt="" class="video-thumb">
          <div class="video-info">
            <div class="video-title" title="${escapeHtml(v.title)}">${escapeHtml(v.title)}</div>
            <div class="video-meta">📺 ${escapeHtml(v.channelTitle)} · ${timeAgo} · 追跡: ${v.snapshots?.length || 0}回</div>

  // ==== OAuth認証（YouTube Analytics API用） ====
  // Firebase Authで既にGoogleログイン済みだが、Analytics APIには
  // 追加スコープ（youtube.readonly, yt-analytics.readonly）が必要なので
  // 再度OAuth認可を取る必要がある
  const YT_ANALYTICS_SCOPES = [
    'https://www.googleapis.com/auth/youtube.readonly',
    'https://www.googleapis.com/auth/yt-analytics.readonly'
  ].join(' ');
  
  function isOAuthAuthenticated() {
    return oauthAccessToken && Date.now() < oauthTokenExpireAt;
  }
  
  document.getElementById('oauthLoginBtn').addEventListener('click', async () => {
    try {
      // Google Identity Services のトークンクライアント
      if (!window.google || !window.google.accounts || !window.google.accounts.oauth2) {
        throw new Error('Google Identity Services が読み込まれていません。しばらく待ってから再試行してください');
      }
      if (!GOOGLE_OAUTH_CLIENT_ID || GOOGLE_OAUTH_CLIENT_ID === 'YOUR_OAUTH_CLIENT_ID_HERE') {
        throw new Error('OAuth クライアントIDが未設定です。Google Cloud Console > 認証情報 からWebクライアントIDを確認し、analyzer.htmlに貼り付けてください');
      }
      
      await new Promise((resolve, reject) => {
        const tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: GOOGLE_OAUTH_CLIENT_ID,
          scope: YT_ANALYTICS_SCOPES,
          prompt: 'consent',
          callback: async (response) => {
            if (response.error) {
              reject(new Error('認証エラー: ' + response.error));
              return;
            }
            oauthAccessToken = response.access_token;
            oauthTokenExpireAt = Date.now() + (response.expires_in * 1000) - 60000; // 念のため1分余裕
            try {
              await fetchMyChannelId();
              saveOAuthState();
              resolve();
            } catch (err) {
              reject(err);
            }
          }
        });
        tokenClient.requestAccessToken();
      });
      
      alert('✅ YouTube連携に成功しました！\n自分のチャンネルの維持率・CTR等の詳細データが取得できます。');
      updateSettingsModal();
      renderAll();
    } catch (err) {
      console.error('OAuth error:', err);
      alert('連携失敗: ' + err.message);
    }
  });
  
  document.getElementById('oauthLogoutBtn').addEventListener('click', () => {
    oauthAccessToken = null;
    oauthTokenExpireAt = 0;
    oauthMyChannelId = null;
    saveOAuthState();
    updateSettingsModal();
    alert('連携を解除しました');
  });
  
  async function fetchMyChannelId() {
    if (!oauthAccessToken) return null;
    const res = await fetch('https://www.googleapis.com/youtube/v3/channels?part=id&mine=true', {
      headers: { 'Authorization': 'Bearer ' + oauthAccessToken }
    });
    const data = await res.json();
    if (data.items && data.items.length > 0) {
      oauthMyChannelId = data.items[0].id;
      return oauthMyChannelId;
    }
    return null;
  }
  
  // YouTube Analytics API で詳細データ取得
  // 自チャンネルのみ（OAuth必須）
  // 注：impressions/CTRはAnalytics APIでは取得不可（YouTube Studio専用）
  async function fetchAnalytics(videoId, videoPublishedAt) {
    if (!isOAuthAuthenticated()) {
      throw new Error('OAuth未認証。設定から連携してください');
    }
    const startDate = new Date(videoPublishedAt).toISOString().slice(0, 10);
    const endDate = new Date().toISOString().slice(0, 10);
    const url = new URL('https://youtubeanalytics.googleapis.com/v2/reports');
    url.searchParams.set('ids', 'channel==MINE');
    url.searchParams.set('startDate', startDate);
    url.searchParams.set('endDate', endDate);
    // 利用可能なメトリクスのみ（impressions/CTRはAnalytics APIでは動画単位で取得不可）
    url.searchParams.set('metrics', 'views,estimatedMinutesWatched,averageViewDuration,averageViewPercentage,likes,subscribersGained,subscribersLost,shares,comments');
    url.searchParams.set('filters', `video==${videoId}`);
    const res = await fetch(url, {
      headers: { 'Authorization': 'Bearer ' + oauthAccessToken }
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || res.statusText);
    }
    const data = await res.json();
    if (!data.rows || data.rows.length === 0) return null;
    const [views, watchMinutes, avgDuration, avgPercentage, likes, subGained, subLost, shares, comments] = data.rows[0];
    return {
      views,
      watchMinutes,
      avgDuration, // 秒
      avgPercentage, // %
      likes,
      subGained,
      subLost,
      shares,
      comments
    };
  }

          { label: '登録者増減', data: snaps.map(s => (s.subGained || 0) - (s.subLost || 0)),

    } else {
      section.innerHTML = `
        <div style="padding: 10px; background: var(--dim-bg); border: 2px solid var(--card-border); border-radius: 8px;">
          <button class="btn btn-sm btn-primary" data-fetch-analytics>📊 詳細データを取得</button>
          <span style="font-size: 11px; color: var(--text-muted); margin-left: 8px;">維持率・CTR・平均視聴時間など</span>
        </div>
      `;
      section.querySelector('[data-fetch-analytics]').addEventListener('click', () => fetchAndShowAnalytics(v));
    }
  }
  
  async function fetchAndShowAnalytics(v) {
    const section = document.getElementById('analyticsSection');
    if (!section) return;
    section.innerHTML = '<div style="padding: 10px; color: var(--text-muted);">⏳ 取得中...</div>';
    try {
      const data = await fetchAnalytics(v.videoId, v.publishedAt);
      if (!data) {
        section.innerHTML = `
          <div style="padding: 10px; background: var(--dim-bg); border: 2px solid var(--card-border); border-radius: 8px; font-size: 12px;">
            ⚠️ データが取得できませんでした（投稿直後の場合、まだデータが反映されていない可能性があります）
          </div>
        `;
        return;
      }
      // スナップショット配列に追加（時系列蓄積）
      if (!v.analyticsSnapshots) v.analyticsSnapshots = [];
      const snapshot = { ...data, at: new Date().toISOString() };
      v.analyticsSnapshots.push(snapshot);
      // 最新のもの（互換用）
      v.analytics = { ...snapshot, fetchedAt: snapshot.at };
      await saveFirestoreData();
      section.innerHTML = renderAnalyticsData(v.analytics, v);
      section.querySelector('[data-refetch-analytics]')?.addEventListener('click', () => fetchAndShowAnalytics(v));
      // モーダル内のグラフも更新
      renderAnalyticsTimeSeriesChart(v);
    } catch (err) {
      section.innerHTML = `
        <div style="padding: 10px; background: var(--danger-bg); border: 2px solid var(--danger); border-radius: 8px; font-size: 12px; color: var(--danger);">
          エラー: ${escapeHtml(err.message)}
        </div>
      `;
    }
  }
  
  function renderAnalyticsData(a, v) {
    const fetched = a.fetchedAt ? new Date(a.fetchedAt).toLocaleString('ja-JP', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }) : '';
    const retentionPercent = a.avgPercentage?.toFixed(1) ?? '—';
    const avgMin = Math.floor((a.avgDuration || 0) / 60);
    const avgSec = Math.round((a.avgDuration || 0) % 60);
    const netSubs = (a.subGained || 0) - (a.subLost || 0);
    return `
      <div style="padding: 12px; background: var(--dim-bg); border: 2px solid var(--card-border); border-radius: 10px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 6px;">
          <div style="font-weight: 800; font-size: 13px;">📊 YouTube詳細データ</div>
          <div style="display: flex; gap: 6px; align-items: center;">
            <span style="font-size: 10px; color: var(--text-faint);">取得: ${fetched}</span>
            <button class="btn btn-sm" data-refetch-analytics>🔄 再取得</button>
          </div>
        </div>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 8px;">
          <div class="analytics-stat">
            <div class="analytics-stat-label">平均視聴率</div>
            <div class="analytics-stat-value">${retentionPercent}%</div>
          </div>
          <div class="analytics-stat">
            <div class="analytics-stat-label">平均視聴時間</div>
            <div class="analytics-stat-value">${avgMin}:${String(avgSec).padStart(2,'0')}</div>
          </div>
          <div class="analytics-stat">
            <div class="analytics-stat-label">総視聴時間</div>
            <div class="analytics-stat-value">${Math.round(a.watchMinutes || 0).toLocaleString()}分</div>
          </div>
          <div class="analytics-stat">
            <div class="analytics-stat-label">共有数</div>
            <div class="analytics-stat-value">${(a.shares || 0).toLocaleString()}</div>
          </div>
          <div class="analytics-stat">
            <div class="analytics-stat-label">登録者増減</div>
            <div class="analytics-stat-value" style="color: ${netSubs >= 0 ? 'var(--accent-teal)' : 'var(--danger)'}">
              ${netSubs >= 0 ? '+' : ''}${netSubs.toLocaleString()}
            </div>
          </div>
          <div class="analytics-stat">
            <div class="analytics-stat-label">登録増 / 登録減</div>
            <div class="analytics-stat-value" style="font-size: 14px;">+${(a.subGained || 0).toLocaleString()} / -${(a.subLost || 0).toLocaleString()}</div>
          </div>
        </div>
        <div style="margin-top: 8px; padding: 6px 8px; background: var(--card-bg); border: 1px dashed var(--section-dashed); border-radius: 6px; font-size: 10px; color: var(--text-faint);">
          💡 インプレッション数・CTRは YouTube Analytics API の制限で取得できません。YouTubeスタジオで直接確認してください。
        </div>
      </div>
    `;
  }

  function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
  }

  function formatDuration(iso) {
    const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
    if (!m) return iso;
    const h = parseInt(m[1] || 0);
    const min = parseInt(m[2] || 0);
    const s = parseInt(m[3] || 0);
    if (h > 0) return `${h}:${String(min).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    return `${min}:${String(s).padStart(2,'0')}`;
  }
  
  function formatElapsed(ms) {
    const hours = ms / 3600000;
    if (hours < 1) return `${Math.round(ms / 60000)}分後`;
    if (hours < 24) return `${hours.toFixed(1)}時間後`;
    const days = hours / 24;
    if (days < 7) return `${days.toFixed(1)}日後`;
    return `${(days / 7).toFixed(1)}週間後`;
  }
</script>

</body>
</html>
